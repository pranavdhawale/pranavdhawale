name: Update GitHub Stats

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:
  push:
    branches: [master]
    paths: ['.github/workflows/update-stats.yml']

permissions:
  contents: write

jobs:
  update-stats:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.STATS_TOKEN }}

      - name: Fetch GitHub Stats
        id: stats
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.STATS_TOKEN || github.token }}
          script: |
            const username = context.repo.owner;
            core.info(`Username: ${username}`);

            function calculateStreaks(contributionDays) {
              const sortedDays = [...contributionDays].sort((a, b) => new Date(b.date) - new Date(a.date));
              const dayMap = new Map();
              sortedDays.forEach(day => dayMap.set(day.date, day.contributionCount));

              const today = new Date();
              const todayUTC = new Date(Date.UTC(today.getUTCFullYear(), today.getUTCMonth(), today.getUTCDate()));
              const yesterdayUTC = new Date(todayUTC.getTime() - 24 * 60 * 60 * 1000);
              const todayStr = todayUTC.toISOString().split('T')[0];
              const yesterdayStr = yesterdayUTC.toISOString().split('T')[0];

              let currentStreak = 0;
              const todayCount = dayMap.get(todayStr) || 0;
              const yesterdayCount = dayMap.get(yesterdayStr) || 0;

              if (todayCount > 0) {
                currentStreak = 1;
                let checkDate = yesterdayUTC;
                while (true) {
                  const dateStr = checkDate.toISOString().split('T')[0];
                  const count = dayMap.get(dateStr) || 0;
                  if (count > 0) {
                    currentStreak++;
                    checkDate = new Date(checkDate.getTime() - 24 * 60 * 60 * 1000);
                  } else break;
                }
              } else if (yesterdayCount > 0) {
                currentStreak = 1;
                let checkDate = new Date(yesterdayUTC.getTime() - 24 * 60 * 60 * 1000);
                while (true) {
                  const dateStr = checkDate.toISOString().split('T')[0];
                  const count = dayMap.get(dateStr) || 0;
                  if (count > 0) {
                    currentStreak++;
                    checkDate = new Date(checkDate.getTime() - 24 * 60 * 60 * 1000);
                  } else break;
                }
              }
              return { currentStreak, longestStreak: calculateLongestStreak(sortedDays) };
            }

            function calculateLongestStreak(sortedDays) {
              const ascendingDays = [...sortedDays].sort((a, b) => new Date(a.date) - new Date(b.date));
              let longestStreak = 0, currentStreak = 0, prevDate = null;
              for (const day of ascendingDays) {
                if (day.contributionCount === 0) {
                  longestStreak = Math.max(longestStreak, currentStreak);
                  currentStreak = 0;
                  prevDate = null;
                  continue;
                }
                if (!prevDate) currentStreak = 1;
                else {
                  const expectedPrev = new Date(new Date(day.date).getTime() - 24 * 60 * 60 * 1000);
                  if (prevDate.getTime() === expectedPrev.getTime()) currentStreak++;
                  else {
                    longestStreak = Math.max(longestStreak, currentStreak);
                    currentStreak = 1;
                  }
                }
                prevDate = new Date(day.date);
              }
              return Math.max(longestStreak, currentStreak);
            }

            let totalContributions = 0, currentStreak = 0, longestStreak = 0;

            const currentYear = new Date().getUTCFullYear();
            const queries = [];
            for (let year = 2021; year <= currentYear; year++) {
              const fromDate = `${year}-01-01T00:00:00Z`;
              const toDate = year === currentYear ? new Date().toISOString() : `${year}-12-31T23:59:59Z`;
              queries.push(github.graphql(`
                query($username: String!, $from: DateTime!, $to: DateTime!) {
                  user(login: $username) {
                    contributionsCollection(from: $from, to: $to) {
                      contributionCalendar {
                        totalContributions
                        weeks { contributionDays { date contributionCount } }
                      }
                    }
                  }
                }`, { username, from: fromDate, to: toDate }));
            }

            try {
              const results = await Promise.all(queries);
              const allDays = [];
              results.forEach(r => {
                const cal = r?.user?.contributionsCollection?.contributionCalendar;
                if (cal) {
                  totalContributions += cal.totalContributions || 0;
                  cal.weeks?.forEach(w => w.contributionDays?.forEach(d => {
                    if (d) allDays.push({ date: d.date, contributionCount: d.contributionCount });
                  }));
                }
              });
              const streaks = calculateStreaks(allDays);
              currentStreak = streaks.currentStreak;
              longestStreak = streaks.longestStreak;
            } catch (e) {
              core.error(`GraphQL contributions error: ${e.message}`);
              core.error(`Stack: ${e.stack}`);
            }
            core.info(`Total contributions: ${totalContributions}`);
            core.info(`Current streak: ${currentStreak}`);
            core.info(`Longest streak: ${longestStreak}`);

            let userData = {};
            try {
              const gu = await github.graphql(`
                query($username: String!) {
                  user(login: $username) {
                    login, name, avatarUrl
                    repositories(privacy: PUBLIC) { totalCount }
                    followers { totalCount }
                    following { totalCount }
                  }
                }`, { username });
              if (gu?.user) {
                userData = {
                  login: gu.user.login, name: gu.user.name, avatar_url: gu.user.avatarUrl,
                  public_repos: gu.user.repositories?.totalCount || 0,
                  followers: gu.user.followers?.totalCount || 0,
                  following: gu.user.following?.totalCount || 0
                };
              }
            } catch (e) {
              core.warning(`GraphQL user query failed: ${e.message}`);
              const { data: u } = await github.rest.users.getByUsername({ username });
              userData = { login: u.login, name: u.name, avatar_url: u.avatar_url, public_repos: u.public_repos, followers: u.followers, following: u.following };
            }

            let repos = [];
            try {
              const { data: r } = await github.rest.repos.listForAuthenticatedUser({ per_page: 100, affiliation: 'owner', visibility: 'all' });
              repos = r;
            } catch (e) {
              core.warning(`listForAuthenticatedUser failed: ${e.message}`);
              const { data: r } = await github.rest.repos.listForUser({ username, per_page: 100 });
              repos = r;
            }

            const totalStars = repos.reduce((s, r) => s + (r.stargazers_count || 0), 0);
            core.info(`Total stars: ${totalStars}`);
            core.info(`Repos found: ${repos.length}`);
            const langs = {};
            repos.forEach(r => { if (r.language) langs[r.language] = (langs[r.language] || 0) + 1; });
            const topLangs = Object.entries(langs).sort((a, b) => b[1] - a[1]).slice(0, 3).map(([l]) => l).join(' · ') || 'N/A';

            core.setOutput('stars', totalStars);
            core.setOutput('followers', userData.followers || 0);
            core.setOutput('following', userData.following || 0);
            core.setOutput('total_contributions', totalContributions);
            core.setOutput('current_streak', currentStreak);
            core.setOutput('longest_streak', longestStreak);

      - name: Update README
        run: |
          STARS="${{ steps.stats.outputs.stars }}"
          FOLLOWERS="${{ steps.stats.outputs.followers }}"
          FOLLOWING="${{ steps.stats.outputs.following }}"
          CONTRIBUTIONS="${{ steps.stats.outputs.total_contributions }}"
          CURRENT_STREAK="${{ steps.stats.outputs.current_streak }}"
          LONGEST_STREAK="${{ steps.stats.outputs.longest_streak }}"

          # Create new stats block (no ./fetch-github-stats prefix - that's in the README)
          printf 'GITHUB STATS\n' > /tmp/stats_block.txt
          printf '────────────────────────────────\n' >> /tmp/stats_block.txt
          printf 'Total Stars     :      %s\n' "$STARS" >> /tmp/stats_block.txt
          printf 'Followers       :      %s\n' "$FOLLOWERS" >> /tmp/stats_block.txt
          printf 'Following       :      %s\n' "$FOLLOWING" >> /tmp/stats_block.txt
          printf 'Total Commits   :      %s\n' "$CONTRIBUTIONS" >> /tmp/stats_block.txt
          printf 'Current Streak  :      %s days\n' "$CURRENT_STREAK" >> /tmp/stats_block.txt
          printf 'Longest Streak  :      %s days\n' "$LONGEST_STREAK" >> /tmp/stats_block.txt
          printf '\n' >> /tmp/stats_block.txt

          # Replace stats block using state machine:
          # 0 = normal (print), 1 = after marker (skip until GITHUB STATS)
          # 2 = in old stats block (skip until empty line)
          if grep -q "fetch-github-stats" README.md; then
            awk '
            BEGIN { state=0 }
            /\.\/fetch-github-stats/ {
              print
              print ""
              while((getline line < "/tmp/stats_block.txt") > 0) print line
              close("/tmp/stats_block.txt")
              state=1
              next
            }
            state==1 && /^GITHUB STATS/ { state=2; next }
            state==1 { next }
            state==2 && /^$/ { state=0; next }
            state==2 { next }
            { print }
            ' README.md > /tmp/README_NEW.md
            mv /tmp/README_NEW.md README.md
          fi

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          git diff --staged --quiet || (git commit -m "chore: update github stats [skip ci]" && git push)
